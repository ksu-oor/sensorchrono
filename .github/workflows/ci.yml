name: CI

# Fast, hardware-free gate: the whole test suite + the module info smoke run on
# Linux. The real Windows installer build lives in release.yml.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: System libraries for offscreen Qt
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Module smoke (--info lists profiles)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m sensorchrono --info
