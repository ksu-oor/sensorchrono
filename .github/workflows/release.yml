name: Release

# Build + publish the Windows installer. Three ways in:
#   * push to `main`           -> AUTO-bump the patch and publish a GitHub Release
#                                 (the version is computed from existing tags +
#                                  the committed floor; see build/next_version.py).
#   * push a v*.*.* tag        -> publish a Release at that exact version (manual
#                                 override / forced minor-major).
#   * workflow_dispatch        -> build a downloadable test artifact, NO publish.
#
# Add "[skip release]" to the commit SUBJECT (first line) to skip the build on that
# push. Only the subject is inspected — a body that merely *mentions* the token
# (a changelog, a doc, this workflow's own introducing commit) does NOT skip.
on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version for a test build, e.g. 1.0.0-rc1 (no leading v)"
        required: false
        default: ""

# Serialize releases so two quick merges don't race for the same number. We do
# NOT cancel in-progress builds (a half-published release is worse than a wait).
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Decide whether this push opts out of a release. We inspect ONLY the commit
  # SUBJECT (first line) for the [skip release] token, never the body — otherwise a
  # commit that merely *describes* the token (a changelog, a doc, or this pipeline's
  # own introducing commit) skips itself. GitHub's expression language can't split a
  # message into lines, so the decision is made here in shell and exposed as an
  # output the build job gates on. A *branch* push is the only skippable trigger:
  # tag pushes and manual dispatches always build. The message reaches the script via
  # an env var (never inlined as ${{ }}) so a crafted commit can't inject shell.
  gate:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.decide.outputs.skip }}
    steps:
      - id: decide
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          # head_commit is populated only for push events; empty otherwise.
          MSG: ${{ github.event.head_commit.message }}
        run: |
          skip=false
          if [ "$EVENT" = "push" ] && [[ "$REF" != refs/tags/* ]]; then
            subject="$(printf '%s\n' "$MSG" | head -n1)"
            if printf '%s' "$subject" | grep -qF '[skip release]'; then
              skip=true
            fi
          fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"
          echo "event=$EVENT ref=$REF skip=$skip"

  build-windows:
    needs: gate
    if: needs.gate.outputs.skip != 'true'
    runs-on: windows-latest
    steps:
      # fetch-depth: 0 brings the full tag history so next_version.py can find the
      # latest release tag when auto-computing on a push to main.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Resolve the version from the trigger, then HARD-VALIDATE it before it is
      # ever used to stamp files. A tag/auto-computed value is trusted by shape;
      # the dispatch input is untrusted and must be strict semver or it's rejected.
      - name: Resolve and validate version
        id: ver
        shell: pwsh
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if ($env:REF -like "refs/tags/v*") {
            $v = $env:REF -replace "^refs/tags/v", ""
            Write-Host "Version from tag: $v"
          } elseif ($env:EVENT -eq "workflow_dispatch") {
            if (-not $env:DISPATCH_VERSION) {
              throw "workflow_dispatch requires the 'version' input, e.g. 1.0.0-rc1."
            }
            $v = $env:DISPATCH_VERSION
            Write-Host "Version from dispatch input: $v"
          } elseif ($env:EVENT -eq "push") {
            # push to main -> next patch from existing tags + the committed floor
            $v = (python build/next_version.py).Trim()
            Write-Host "Auto-computed next version: $v"
          } else {
            throw "Unsupported trigger '$($env:EVENT)' / ref '$($env:REF)'."
          }
          if ($v -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$') {
            throw "Refusing unsafe/invalid version string: '$v'"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Stamp into the BUILD TREE only (never committed). VERSION already passed the
      # strict semver regex above, so it carries no PowerShell metacharacters. The
      # non-greedy [^"]* class changes only the quoted version literal, then we
      # HARD-VERIFY the stamp landed in both files — a silent regex no-match would
      # otherwise publish an installer whose version disagrees with the tag/Release.
      - name: Stamp version into the build tree
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          (Get-Content sensorchrono/__init__.py) `
            -replace '^__version__ = "[^"]*"', "__version__ = `"$env:VERSION`"" |
            Set-Content sensorchrono/__init__.py
          (Get-Content build/installer.iss) `
            -replace '^#define AppVersion "[^"]*"', "#define AppVersion `"$env:VERSION`"" |
            Set-Content build/installer.iss
          if (-not (Select-String -Path sensorchrono/__init__.py -SimpleMatch -Quiet `
                    -Pattern "__version__ = `"$env:VERSION`"")) {
            throw "Version stamp failed: sensorchrono/__init__.py is not at $env:VERSION"
          }
          if (-not (Select-String -Path build/installer.iss -SimpleMatch -Quiet `
                    -Pattern "#define AppVersion `"$env:VERSION`"")) {
            throw "Version stamp failed: build/installer.iss is not at $env:VERSION"
          }

      - name: Create venv and install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .venv\Scripts\python.exe -m pip install --upgrade pip
          .venv\Scripts\python.exe -m pip install -r requirements.txt -r requirements-dev.txt

      # Smoke before we spend minutes building: the frozen exe can't honour
      # --info (it launches the GUI), so we run the *module* form here.
      - name: Smoke (tests + module --info)
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          .venv\Scripts\python.exe -m pytest -q
          .venv\Scripts\python.exe -m sensorchrono --info

      # Bundle a real LabRecorder so the installer is a true one-download. The
      # zip may nest a subfolder, so we locate LabRecorder.exe and point the
      # spec's LABRECORDER_DIR at the folder that actually contains it.
      - name: Download and locate LabRecorder
        shell: pwsh
        run: |
          $url = "https://github.com/labstreaminglayer/App-LabRecorder/releases/download/v1.17.0/LabRecorder-1.17.0-Win_amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile labrecorder.zip
          Expand-Archive -Path labrecorder.zip -DestinationPath labrecorder -Force
          $exe = Get-ChildItem -Path labrecorder -Recurse -Filter LabRecorder.exe | Select-Object -First 1
          if (-not $exe) { throw "LabRecorder.exe not found in the downloaded zip" }
          "LABRECORDER_DIR=$($exe.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build one-folder app (PyInstaller)
        shell: pwsh
        run: .\build\build_windows.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      # Compile from the repo root so installer.iss's DistDir="..\dist\SensorChrono"
      # (relative to build/) resolves to dist\SensorChrono.
      - name: Compile installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /O"dist\installer" build\installer.iss

      - name: Locate installer
        id: artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist\installer -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "no installer .exe produced" }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Installer: $($exe.FullName)"

      # Manual dispatch -> downloadable artifact only (no public release).
      - name: Upload test-build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: SensorChrono-${{ steps.ver.outputs.version }}-setup
          path: ${{ steps.artifact.outputs.path }}

      # push to main OR a v*.*.* tag -> publish the installer on a GitHub Release.
      # On a main push the tag v<version> doesn't exist yet; action-gh-release
      # creates it at this commit. A tag created by GITHUB_TOKEN does NOT re-fire
      # this workflow (GitHub loop-prevention), so there is no double build.
      - name: Publish GitHub Release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: SensorChrono v${{ steps.ver.outputs.version }}
          files: ${{ steps.artifact.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
