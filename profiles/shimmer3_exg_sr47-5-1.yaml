# Device profile for Shimmer3 EXG SR47-5-1 (low-noise EXG variant)
# https://www.shimmersensing.com/wp-content/uploads/2025/11/Shimmer3-ExG-ECG-EMG-Ebio-Spec-Sheet.pdf.pdf

profile_id: shimmer3_exg_sr47-5-1
device_type: biosignal
manufacturer: Shimmer Research
hardware_revision: SR47-5-1
firmware_assumed: LogAndStream >= 0.11
transport: bluetooth_rfcomm     # RN42 BT 2.1+EDR via Windows virtual COM

bridges:
  exg:
    module: shimmer_lsl_bridge   # path: ./shimmer_lsl_bridge.py
    defaults:
      mode: ecg                  # ecg | emg
      sampling_rate_hz: 256
      baud: 115200
    streams_emitted:
      - {name: ShimmerECG, type: ECG, channels: 4, rate_hz: 256}
      - {name: ShimmerEMG, type: EMG, channels: 3, rate_hz: 512}
      - {name: ShimmerMarkers, type: Markers, channels: 1, rate_hz: 0}
      - {name: ShimmerDiagnostics_ECG, type: Diagnostics, channels: 5, rate_hz: 1}
  accel:
    module: shimmer_accel_bridge  # path: ./shimmer_accel_bridge.py (EXP-03)
    defaults:
      sampling_rate_hz: 256
      sensor: low_noise           # low_noise | wide_range
    streams_emitted:
      - {name: ShimmerAccel, type: Accel, channels: 3, rate_hz: 256}

# Default fiducial detectors for this device
fiducial_detectors:
  - source: audio_pulse
    detector: accel_onset
    detector_args:
      stream: ShimmerAccel
      axis: 2                  # z-axis for vertical taps; tune by rig
      threshold_sd: 5.0
      refractory_ms: 200
      hp_cutoff_hz: 20.0
  - source: keyboard_event
    detector: accel_onset
    detector_args:
      stream: ShimmerAccel
      axis: 2
      threshold_sd: 3.0
      refractory_ms: 150
      hp_cutoff_hz: 10.0

# Safety / preflight (advisory; recorder warns but does not block in MVP)
safety:
  preflight_checks: []          # TODO: query battery, link quality via BT
  max_continuous_minutes: 240   # battery typically lasts longer; conservative

# Calibration constants populated by `sensorchrono calibrate`
# Each entry: lag_ms = (detected_t in stream) - (reference_t of fiducial)
# After post-processing applies the subtraction, the modality's timestamps
# refer to when the physical event happened, not when LSL saw the packet.
calibration:
  status: drift_measured_ecg_lag_bound_only  # drift measured; ECG lag is lower bound; audio+video lag measured per-recording in-situ
  measured_at: 2026-06-03
  reference_fiducial: keyboard_multimodal (HID + audio click + video frame)
  n_events: 538                 # from EXP-06 in-situ calibration (typical session has 10-20 in calibration block)
  lag_ms:
    # Per-recording in-situ values from analysis/insitu_lag_calibration.py take precedence over these.
    # Below are MEDIAN values observed on EXP-06; populate per-recording in pipeline_report.json.
    ShimmerECG: null            # only a lower bound (~-4.4 ms from BT one-way min) is computable in-situ;
                                #   full lag requires external piezo+Arduino fiducial rig
    ShimmerEMG: null            # unmeasured
    ShimmerAccel: null          # unmeasured (vibration coupling failed in EXP-03)
  lag_ms_other_modalities:      # measured per-recording by analysis/insitu_lag_calibration.py
    Audio_BRIO_via_USB: 46.5    # median ms over n=529 keystrokes; 95%CI [44.5, 51.8]
    VideoFrames_BRIO_via_USB: 1.35  # median ms over n=538 keystrokes; 95%CI [-0.05, 2.63]
  drift_ppm_observed:           # rolling-min OWD on ShimmerDiagnostics_ECG ch1, Theil-Sen fit
    runs:
      - {date: 2026-06-02, exp: EXP-00, duration_s: 300, ppm: 31.1}
      - {date: 2026-06-02, exp: EXP-01, duration_s: 314, ppm: 37.4}
      - {date: 2026-06-03, exp: EXP-06, duration_s: 297, ppm: 35.8, residual_std_ms: 2.5}
    median_ppm: 35.8
    spread_ppm: 6.3              # max - min across the 3 runs
    note: |
      Crystal drift is stable enough across sessions that a single
      linear fit per recording suffices (variance across runs < 7 ppm,
      well within typical 32.768 kHz crystal temperature spec).
      Sign convention: positive ppm = system clock faster than device.
      Fit method: rolling 10s minimum of `last_observed_s` (col 1) of
      ShimmerDiagnostics_ECG stream, then Theil-Sen on the binned series.
